<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verzius — Agência de Vídeos Virais com IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <div id="login" class="login-screen hidden">
    <div class="login-card">
      <div class="logo-big">▶ Verz<span>ius</span></div>
      <p class="muted">Acesso restrito</p>
      <input type="password" id="loginPass" placeholder="Senha do painel" />
      <button class="btn primary" onclick="doLogin()">Entrar</button>
      <p id="loginErr" class="err hidden">Senha incorreta.</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="logo">▶ Verz<span>ius</span></div>
      <nav>
        <div class="nav-label">Visão geral</div>
        <a data-view="dashboard" class="active"><span class="material-icons-round nav-icon">dashboard</span>Dashboard</a>
        <a data-view="clients"><span class="material-icons-round nav-icon">group</span>Clientes</a>
        <div class="nav-label">Produção</div>
        <a data-view="profile"><span class="material-icons-round nav-icon">face</span>Perfil de IA</a>
        <a data-view="studio"><span class="material-icons-round nav-icon">edit_note</span>Estúdio de Roteiro</a>
        <a data-view="videos"><span class="material-icons-round nav-icon">movie</span>Vídeos</a>
        <a data-view="posts"><span class="material-icons-round nav-icon">rocket_launch</span>Publicações</a>
        <a data-view="calendar"><span class="material-icons-round nav-icon">calendar_month</span>Calendário</a>
        <div class="nav-label">Sistema</div>
        <a data-view="admin" id="navAdmin" class="hidden"><span class="material-icons-round nav-icon">shield</span>Aprovações</a>
        <a data-view="settings"><span class="material-icons-round nav-icon">settings</span>Configurações</a>
      </nav>
      <button class="help-fab" onclick="startTutorial()">🎓 Tutorial guiado</button>
      <div class="mode-badge" id="modeBadge">...</div>
      <div id="userBox" class="user-box"></div>
    </aside>

    <main class="content">
      <div id="view"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Firebase Auth (compat: expoe o global `firebase`) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/app.js"></script>
</body>
</html>
